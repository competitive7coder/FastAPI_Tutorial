<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tisfoulla Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      animation: {
        float: 'float 6s ease-in-out infinite',
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-6px)' },
        }
      }
    }
  }
}
</script>
</head>

<body class="min-h-screen flex items-center justify-center 
bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 
dark:from-gray-900 dark:via-gray-800 dark:to-black transition-colors">

<!-- Glow background -->
<div class="absolute inset-0 blur-3xl opacity-30 bg-gradient-to-br from-pink-500 via-indigo-500 to-purple-500"></div>

<!-- Chat Card -->
<div class="relative w-full max-w-md h-[720px] rounded-3xl overflow-hidden
bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
shadow-[0_25px_60px_rgba(0,0,0,0.35)]
flex flex-col border border-white/20">

    <!-- Header -->
    <header class="flex items-center justify-between px-5 py-4 
    bg-gradient-to-r from-indigo-600 to-purple-600 text-white">

        <div class="flex items-center gap-3">
            <img src="logo.jpeg" alt="Bot Logo" class="w-10 h-10 rounded-full ring-2 ring-white/40 animate-float">
            <div>
                <h3 class="font-semibold text-lg leading-none">Chat Bot</h3>
                <p class="text-xs opacity-80">AI Assistant</p>
            </div>
        </div>

        <button id="darkToggle"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
            class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <!-- Chat -->
    <div id="chatbox" class="flex-1 px-4 py-5 space-y-4 overflow-y-auto 
    bg-gradient-to-b from-white/40 to-white/10 dark:from-gray-900/40 dark:to-gray-900/10">
    </div>

    <!-- Typing -->
    <div id="typing" class="hidden px-6 pb-2 text-xs text-gray-600 dark:text-gray-400">
        <span class="inline-flex items-center gap-1">
            <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
            Bot is typing...
        </span>
    </div>

    <!-- Input -->
    <div class="p-4 border-t border-white/20 bg-white/50 dark:bg-gray-900/50 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <input id="inputMessage" type="text"
                placeholder="Ask me anything..."
                class="flex-1 px-5 py-3 rounded-full text-sm
                bg-white/80 dark:bg-gray-800/80
                text-gray-900 dark:text-white
                focus:outline-none focus:ring-2 focus:ring-indigo-500"/>

            <button id="sendBtn"
                aria-label="Send message"
                title="Send message"
                class="w-12 h-12 rounded-full 
                bg-gradient-to-br from-indigo-600 to-purple-600
                text-white shadow-lg hover:scale-105 active:scale-95
                transition flex items-center justify-center disabled:opacity-50">
                <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            </button>
        </div>
    </div>

</div>

<script>
const inputMessage = document.getElementById("inputMessage");
const sendBtn = document.getElementById("sendBtn");
const chatbox = document.getElementById("chatbox");
const typing = document.getElementById("typing");
const darkToggle = document.getElementById("darkToggle");

darkToggle.onclick = () => {
  document.documentElement.classList.toggle("dark");
};

function timeNow() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(text, sender, stream=false) {
  const wrap = document.createElement("div");
  wrap.className = sender === "user" ? "flex justify-end" : "flex gap-2 items-end";

  if (sender === "bot") {
    const img = document.createElement("img");
    img.src = "logo.jpg";
    img.className = "w-8 h-8 rounded-full";
    wrap.appendChild(img);
  }

  const bubble = document.createElement("div");
  bubble.className = sender === "user"
    ? "bg-gradient-to-br from-indigo-600 to-purple-600 text-white px-4 py-3 rounded-2xl rounded-br-md max-w-[75%] shadow-lg"
    : "bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 px-4 py-3 rounded-2xl rounded-bl-md max-w-[75%] shadow-lg";

  const textDiv = document.createElement("div");
  const time = document.createElement("div");
  time.className = "text-[10px] opacity-60 mt-1 text-right";
  time.textContent = timeNow();

  bubble.appendChild(textDiv);
  bubble.appendChild(time);
  wrap.appendChild(bubble);
  chatbox.appendChild(wrap);
  chatbox.scrollTop = chatbox.scrollHeight;

  if (stream) {
    let i = 0;
    const int = setInterval(() => {
      textDiv.textContent += text[i++];
      chatbox.scrollTop = chatbox.scrollHeight;
      if (i >= text.length) clearInterval(int);
    }, 22);
  } else {
    textDiv.textContent = text;
  }
}

async function sendMessage() {
  const msg = inputMessage.value.trim();
  if (!msg) return;

  appendMessage(msg, "user");
  inputMessage.value = "";
  sendBtn.disabled = true;
  typing.classList.remove("hidden");

  try {
    const res = await fetch("http://127.0.0.1:8000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    typing.classList.add("hidden");
    appendMessage(data.reply || "No response", "bot", true);
  } catch {
    typing.classList.add("hidden");
    appendMessage("⚠️ Server not reachable", "bot");
  } finally {
    sendBtn.disabled = false;
    inputMessage.focus();
  }
}

sendBtn.onclick = sendMessage;
inputMessage.addEventListener("keydown", e => e.key === "Enter" && sendMessage());
</script>

</body>
</html>
